services:
  ai-shorta:
    environment:
      PUBLIC_BASE_URL: "${PUBLIC_BASE_URL:?set PUBLIC_BASE_URL}"
      CORS_ALLOWED_ORIGINS: "${CORS_ALLOWED_ORIGINS:?set CORS_ALLOWED_ORIGINS}"
      ADMIN_API_TOKEN: "${ADMIN_API_TOKEN:?set ADMIN_API_TOKEN}"
      DATABASE_URL: "${DATABASE_URL:?set DATABASE_URL}"
      DB_AUTO_MIGRATE: "${DB_AUTO_MIGRATE:-1}"
      DB_IMPORT_JSON_ON_START: "${DB_IMPORT_JSON_ON_START:-0}"
      DB_DUAL_WRITE: "${DB_DUAL_WRITE:-1}"
      DB_READ_PRIMARY: "${DB_READ_PRIMARY:-json}"
      IMAGE_JOB_CONCURRENCY: "${IMAGE_JOB_CONCURRENCY:-2}"
      JSON_BODY_LIMIT: "${JSON_BODY_LIMIT:-50mb}"
      OBJECT_STORAGE_ENABLED: "${OBJECT_STORAGE_ENABLED:-1}"
      OBJECT_STORAGE_ENDPOINT: "${OBJECT_STORAGE_ENDPOINT:?set OBJECT_STORAGE_ENDPOINT}"
      OBJECT_STORAGE_REGION: "${OBJECT_STORAGE_REGION:-auto}"
      OBJECT_STORAGE_BUCKET: "${OBJECT_STORAGE_BUCKET:?set OBJECT_STORAGE_BUCKET}"
      OBJECT_STORAGE_ACCESS_KEY_ID: "${OBJECT_STORAGE_ACCESS_KEY_ID:?set OBJECT_STORAGE_ACCESS_KEY_ID}"
      OBJECT_STORAGE_SECRET_ACCESS_KEY: "${OBJECT_STORAGE_SECRET_ACCESS_KEY:?set OBJECT_STORAGE_SECRET_ACCESS_KEY}"
      OBJECT_STORAGE_PUBLIC_BASE_URL: "${OBJECT_STORAGE_PUBLIC_BASE_URL:?set OBJECT_STORAGE_PUBLIC_BASE_URL}"

  postgres:
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-ai_shorta}"
      POSTGRES_USER: "${POSTGRES_USER:-ai_shorta}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}"
